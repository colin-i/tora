on:
 workflow_dispatch:
  inputs:
   branch:
    description: "another branch"
   testbranch:
    description: "test branch"
   prepack:
    description: "preinstalled packages"
env:
 #for composite
 GITHUB_TOKEN: ${{ secrets.PAT }}
jobs:
 takescreen:
  runs-on: ${{ matrix.os }}
  strategy:
   matrix:
    os: [ubuntu-22.04, ubuntu-24.04]
  steps:
   - uses: colin-i/test/.github/actions/test@main
     if: "${{ github.event.inputs.testbranch == '' }}"
     with:
      branch: ${{ github.event.inputs.branch }}
      prepack: ${{ github.event.inputs.prepack }}
   - uses: colin-i/test/.github/actions/test@test
     if: "${{ github.event.inputs.testbranch != '' }}"
     with:
      branch: ${{ github.event.inputs.branch }}
      prepack: ${{ github.event.inputs.prepack }}
